services:
  logger.channel.os2forms_dig_sig_server:
    parent: logger.channel_base
    arguments: [ 'os2forms_dig_sig_server' ]
  os2forms_dig_sig_server.signing_service:
    class: Drupal\os2forms_dig_sig_server\Service\SigningService
    arguments:
      - '@http_client'
      - '@uuid'
      - '@request_stack'
      - '@logger.channel.os2forms_dig_sig_server'
      - '@file_system'
      - '@config.factory'
